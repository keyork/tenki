name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          TARGET="${{ matrix.target }}"
          mkdir -p dist
          cp "target/${TARGET}/release/tenki" dist/tenki
          chmod +x dist/tenki
          tar -czf "tenki-${VERSION}-${TARGET}.tar.gz" -C dist tenki

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenki-${{ matrix.target }}
          path: tenki-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          cd release
          sha256sum *.tar.gz > "tenki-${GITHUB_REF_NAME}-checksums.txt"

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/tenki-${{ github.ref_name }}-checksums.txt
